<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>ASOConnect | Login</title>

    <link rel="icon" type="image/x-icon"
          href="{{ url_for('static', filename='favicon.png') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

</head>

<body>

<div class="container-fluid vh-100">

<div class="row h-100">

    <!-- LADO ESQUERDO -->

    <div class="col-lg-5 left-side">

        <div class="left-content">

            <img src="{{ url_for('static', filename='favicon.png') }}" class="logo">

            <h1>
                ASO<span>Connect</span>
            </h1>

            <p class="subtitle">

                Sistema de Gestão de Saúde Ocupacional

            </p>

            <div class="features">

                <div>

                    <i class="bi bi-heart-pulse-fill"></i>

                    Gestão de ASOs

                </div>

                <div>

                    <i class="bi bi-people-fill"></i>

                    Funcionários

                </div>

                <div>

                    <i class="bi bi-file-earmark-bar-graph-fill"></i>

                    Relatórios Inteligentes

                </div>

                <div>

                    <i class="bi bi-shield-check"></i>

                    Segurança dos Dados

                </div>

            </div>

        </div>

    </div>

    <!-- LADO DIREITO -->

    <div class="col-lg-7 right-side">

        <div class="login-card">

            <h2>Bem-vindo!</h2>

            <p>

                Faça login utilizando os códigos da empresa.

            </p>

            <form action="/login" method="POST">

                <div class="mb-4">

                    <label>Código da Empresa</label>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-buildings"></i>

                        </span>

                        <input
                        type="text"
                        class="form-control"
                        name="codigo_empresa"
                        placeholder="EMP001"
                        required>

                    </div>

                </div>

                <div class="mb-4">

                    <label>Código de Acesso</label>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-lock-fill"></i>

                        </span>

                        <input
                        type="password"
                        class="form-control"
                        id="senha"
                        name="codigo"
                        placeholder="Digite seu código"
                        required>

                        <button
                        class="btn btn-outline-secondary"
                        type="button"
                        onclick="mostrarSenha()">

                            <i id="iconeSenha" class="bi bi-eye"></i>

                        </button>

                    </div>

                </div>

                <div class="mb-4">
    <label>Senha</label>

        <div class="input-group">
        <span class="input-group-text">
            <i class="bi bi-key-fill"></i>
        </span>

        <input
            type="password"
            class="form-control"
            name="senha"
            placeholder="Digite a senha"
            required>
        </div>
    </div>

                <button class="btn btn-login">

                    <i class="bi bi-box-arrow-in-right"></i>

                    Entrar

                </button>

            </form>

            <div class="footer">

                © 2026 ASOConnect

            </div>

        </div>

    </div>

</div>

</div>

<script src="{{ url_for('static', filename='js/login.js') }}"></script>

</body>

</html>
